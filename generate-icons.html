<!DOCTYPE html>
<html>
<head>
  <meta charset="UTF-8" />
  <title>Agent Trainer — Icon Generator</title>
  <style>
    body { background: #0a0608; color: #f0eaf8; font-family: monospace; display: flex; flex-direction: column; align-items: center; justify-content: center; min-height: 100vh; gap: 24px; margin: 0; }
    canvas { border-radius: 22%; display: block; }
    button { background: #8b5cf6; color: #fff; border: none; padding: 12px 28px; border-radius: 8px; font-family: monospace; font-size: 14px; cursor: pointer; letter-spacing: 0.08em; }
    button:hover { background: #7c3aed; }
    .row { display: flex; gap: 32px; align-items: flex-end; }
    .col { display: flex; flex-direction: column; align-items: center; gap: 10px; }
    p { color: #9c8faa; font-size: 12px; margin: 0; letter-spacing: 0.1em; }
  </style>
</head>
<body>
  <p style="color:#8b5cf6;font-size:16px;letter-spacing:0.15em;">AGENT TRAINER — ICON GENERATOR</p>

  <div class="row">
    <div class="col">
      <canvas id="c512" width="512" height="512"></canvas>
      <p>512 × 512</p>
      <button onclick="download('c512','icon-512.png')">DOWNLOAD icon-512.png</button>
    </div>
    <div class="col">
      <canvas id="c192" width="192" height="192" style="width:192px;height:192px"></canvas>
      <p>192 × 192</p>
      <button onclick="download('c192','icon-192.png')">DOWNLOAD icon-192.png</button>
    </div>
    <div class="col">
      <canvas id="c180" width="180" height="180" style="width:180px;height:180px"></canvas>
      <p>180 × 180 (Apple Touch)</p>
      <button onclick="download('c180','apple-touch-icon.png')">DOWNLOAD apple-touch-icon.png</button>
    </div>
  </div>

  <p>Download all three files → place them in the <strong>public/</strong> folder of the project</p>

  <script>
    function drawIcon(canvas) {
      const size = canvas.width;
      const ctx = canvas.getContext('2d');
      const r = size * 0.18; // corner radius

      // Background
      ctx.beginPath();
      ctx.moveTo(r, 0);
      ctx.lineTo(size - r, 0);
      ctx.quadraticCurveTo(size, 0, size, r);
      ctx.lineTo(size, size - r);
      ctx.quadraticCurveTo(size, size, size - r, size);
      ctx.lineTo(r, size);
      ctx.quadraticCurveTo(0, size, 0, size - r);
      ctx.lineTo(0, r);
      ctx.quadraticCurveTo(0, 0, r, 0);
      ctx.closePath();
      ctx.fillStyle = '#0a0608';
      ctx.fill();

      // Subtle purple glow behind text
      const glow = ctx.createRadialGradient(size/2, size/2, 0, size/2, size/2, size*0.45);
      glow.addColorStop(0, 'rgba(139,92,246,0.18)');
      glow.addColorStop(1, 'rgba(139,92,246,0)');
      ctx.fillStyle = glow;
      ctx.fill();

      // Bar chart accent (bottom third)
      const barW  = size * 0.07;
      const barGap = size * 0.04;
      const barBaseY = size * 0.82;
      const bars = [0.22, 0.38, 0.28, 0.48, 0.35].map((h, i) => ({
        x: size * 0.14 + i * (barW + barGap),
        h: size * h * 0.38,
      }));
      bars.forEach(({ x, h }) => {
        const grad = ctx.createLinearGradient(0, barBaseY - h, 0, barBaseY);
        grad.addColorStop(0, '#8b5cf6');
        grad.addColorStop(1, '#4c1d95');
        ctx.fillStyle = grad;
        ctx.beginPath();
        ctx.roundRect(x, barBaseY - h, barW, h, size * 0.012);
        ctx.fill();
      });

      // "AT" text
      const fontSize = size * 0.38;
      ctx.font = `900 ${fontSize}px 'Arial Black', Arial, sans-serif`;
      ctx.textAlign = 'center';
      ctx.textBaseline = 'middle';

      // Text gradient
      const tGrad = ctx.createLinearGradient(size*0.2, 0, size*0.8, size*0.6);
      tGrad.addColorStop(0, '#c4b5fd');
      tGrad.addColorStop(0.5, '#8b5cf6');
      tGrad.addColorStop(1, '#6d28d9');
      ctx.fillStyle = tGrad;
      ctx.fillText('AT', size / 2, size * 0.42);

      // Bottom label
      const labelSize = size * 0.06;
      ctx.font = `600 ${labelSize}px 'Courier New', monospace`;
      ctx.fillStyle = 'rgba(156,143,170,0.6)';
      ctx.fillText('AGENT TRAINER', size / 2, size * 0.94);
    }

    ['c512','c192','c180'].forEach(id => {
      drawIcon(document.getElementById(id));
    });

    function download(canvasId, filename) {
      const canvas = document.getElementById(canvasId);
      const link = document.createElement('a');
      link.download = filename;
      link.href = canvas.toDataURL('image/png');
      link.click();
    }
  </script>
</body>
</html>
